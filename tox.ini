[tox]
min_version = 4.0
envlist = py314, lint, type
isolated_build = true

[testenv]
dependency_groups = dev
commands =
    pytest {posargs}

[testenv:lint]
dependency_groups = dev
commands =
    ruff check src/ tests/
    ruff format --check src/ tests/

[testenv:type]
dependency_groups = dev
commands =
    mypy src/
