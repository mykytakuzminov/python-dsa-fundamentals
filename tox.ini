[tox]
minversion = 4.0
envlist = py314, ruff, mypy
isolated_build = true

[gh-actions]
python =
    3.14: py314, ruff, mypy

[testenv]
setenv =
    PYTHONPATH = {toxinidir}
deps = .
commands =
    pytest -v tests

[testenv:ruff]
basepython = python3.14
deps = ruff
commands = ruff check src tests

[testenv:mypy]
basepython = python3.14
deps = .
commands = mypy src
